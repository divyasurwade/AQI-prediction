services:
  - type: web
    name: aqi-comparative-analysis
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120 app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: TF_CPP_MIN_LOG_LEVEL
        value: "2"
